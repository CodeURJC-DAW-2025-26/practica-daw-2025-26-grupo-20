services:
  # Servicio de Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-my_secret_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mokaf_database}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s       # Cada cuánto tiempo hace la comprobación
      timeout: 5s         # Tiempo de espera máximo para la prueba
      retries: 5          # Número de intentos antes de marcarlo como fallido
      start_period: 10s   # Periodo de gracia al arrancar el contenedor

  # Servicio de la Aplicación Spring Boot (Mokaf)
  app:
    image: ${DOCKERHUB_USER}/mokaf:latest
    container_name: mokaf_app
    ports:
      - "8443:8443"
    environment:
      # Configuramos la conexión a la base de datos para Spring Boot
      # Observa que usamos "db" (el nombre del servicio de arriba) como host
      # corregido: la base de datos dentro de la URL también se parametriza
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-mokaf_database}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      # corregido: la contraseña también se parametriza
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-my_secret_password}
      # Modo inicialización:
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
    depends_on:
      db:
        # Esto hace que la app espere a que el "healthcheck" de la BD sea exitoso ("healthy")
        condition: service_healthy

volumes:
  mysql_data:


