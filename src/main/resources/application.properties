spring.application.name=mokaf
#server.port=8080  ya no es necesario pues tengo los puertos 443 para las ramas y dev y 8443 para main

# =========================
# MySQL datasource
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/mokaf_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
spring.datasource.username=root
spring.datasource.password=1234

# (opcional) pool/driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / Hibernate
# =========================
# Usa "update" mientras construís. Cuando ya tengáis el SQL definitivo, cambiad a "validate".
spring.jpa.hibernate.ddl-auto=create

# Logging SQL (útil para depurar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# LOB/Blob: reduce problemas con MySQL en algunos entornos
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
#spring.profiles.active=dev

#############  HTTPs ################
server.port=8443
server.ssl.key-store=classpath:keystore.jks
server.ssl.key-store-password=password
server.ssl.key-store-type=JKS
server.ssl.key-alias=selfsigned

