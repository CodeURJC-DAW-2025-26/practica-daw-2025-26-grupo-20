spring.application.name=mokaf
server.port=8080

# =========================
# MySQL datasource
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/mokaf_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
spring.datasource.username=root
spring.datasource.password=1234

# (opcional) pool/driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / Hibernate
# =========================
# Usa "update" mientras construís. Cuando ya tengáis el SQL definitivo, cambiad a "validate".
spring.jpa.hibernate.ddl-auto=update

# Logging SQL (útil para depurar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Naming strategy: convierte camelCase -> snake_case
# Esto afecta directamente a Image.imageFile -> image_file
spring.jpa.hibernate.naming.physical-strategy=org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

# LOB/Blob: reduce problemas con MySQL en algunos entornos
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
