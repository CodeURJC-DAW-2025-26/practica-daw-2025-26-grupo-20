      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          maxLength: 2147483647
          minLength: 6
          pattern: "^(?=.*[a-zA-Z])(?=.*\\d).+$"
      required:
      - email
      - name
      - password
    ProductStatDTO:
      type: object
      properties:
        id:
