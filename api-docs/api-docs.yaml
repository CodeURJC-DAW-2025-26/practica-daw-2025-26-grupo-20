      type: object
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
        email:
          type: string
          format: email
          minLength: 1
        phone:
          type: string
        subject:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        newsletter:
          type: boolean
      required:
      - email
      - firstName
      - message
      - subject
    AuthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - SUCCESS
          - FAILURE
        message:
          type: string
