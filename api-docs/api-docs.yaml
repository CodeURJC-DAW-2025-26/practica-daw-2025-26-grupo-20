                type: object
                additionalProperties:
                  type: string
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
        "403":
          description: Forbidden — admin only
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
