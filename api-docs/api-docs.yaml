        itemCount:
          type: integer
          format: int32
        totalUnits:
          type: integer
          format: int32
    BranchDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
        description:
          type: string
        purchaseDiscountPercent:
          type: number
      required:
      - name
      - purchaseDiscountPercent
    ReviewDTO:
      type: object
      properties:
