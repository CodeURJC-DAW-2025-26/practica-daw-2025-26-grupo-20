          type: string
          writeOnly: true
        imageId:
          type: integer
          format: int64
        profileImageUrl:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        description:
          type: string
        position:
          type: string
        department:
          type: string
        salary:
          type: number
        hireDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    UpdateMeRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        description:
          type: string
        position:
          type: string
        department:
          type: string
    AllergenDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    ProductDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        priceBase:
          type: number
        category:
          type: string
        imageId:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        allergens:
          type: array
          items:
            $ref: "#/components/schemas/AllergenDTO"
    FaqDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        question:
          type: string
        answer:
          type: string
    CartItemDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
